version: "3.8"

services:
  # Backend Service (Full version)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://recruitment_user:recruitment_pass@postgres:5432/recruitment_db
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=your_jwt_secret_key
      - GOOGLE_CREDENTIALS_PATH=/app/credentials/google-credentials.json
    volumes:
      - ./backend:/app
      - ./credentials:/app/credentials
      - face_data:/app/face_recognition_data
      - exam_videos:/app/exam_videos
    depends_on:
      - postgres
      - redis
      - qdrant
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    profiles:
      - full
      - dev
      - "" # Default profile

  # Backend Service (Lite version)
  backend-lite:
    build:
      context: ./backend
      dockerfile: Dockerfile-lite
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://recruitment_user:recruitment_pass@postgres:5432/recruitment_db
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=your_jwt_secret_key
      - GOOGLE_CREDENTIALS_PATH=/app/credentials/google-credentials.json
      - FACE_DETECTION_ENABLED=false
      - AI_FEATURES_ENABLED=false
    volumes:
      - ./credentials:/app/credentials
    depends_on:
      - postgres
      - redis
    profiles:
      - lite

  # Frontend Service (Production)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
      - REACT_APP_WS_URL=ws://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    profiles:
      - full
      - "" # Default profile

  # Frontend Service (Development with Hot Reload)
  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
      - REACT_APP_WS_URL=ws://localhost:8000
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    stdin_open: true
    tty: true
    profiles:
      - dev

  # Frontend Service (Lite)
  frontend-lite:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
      - REACT_APP_WS_URL=ws://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend-lite
    profiles:
      - lite

  # n8n Service (Full and Dev only)
  n8n:
    image: n8nio/n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_DATABASE_TYPE=postgresdb
      - N8N_DATABASE_POSTGRESDB_HOST=postgres
      - N8N_DATABASE_POSTGRESDB_DATABASE=recruitment_db
      - N8N_DATABASE_POSTGRESDB_USER=recruitment_user
      - N8N_DATABASE_POSTGRESDB_PASSWORD=recruitment_pass
      - N8N_ENCRYPTION_KEY=your_encryption_key
      - N8N_API_URL=http://localhost:3000
      - N8N_WEBHOOK_URL=http://localhost:5678/webhook
      - N8N_NOTIFICATION_EMAIL=admin@example.com
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - postgres
    profiles:
      - full
      - dev
      - "" # Default profile

  # PostgreSQL Database (All profiles)
  postgres:
    image: postgres:13
    environment:
      - POSTGRES_DB=recruitment_db
      - POSTGRES_USER=recruitment_user
      - POSTGRES_PASSWORD=recruitment_pass
    ports:
      - "5432:5432" # Exposed for lite mode
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Qdrant Vector Database (Full and Dev only)
  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    profiles:
      - full
      - dev
      - "" # Default profile

  # Redis Cache (All profiles)
  redis:
    image: redis:6
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  qdrant_data:
  redis_data:
  n8n_data:
  face_data:
  exam_videos:
