version: "3.8"

services:
  # Backend Service (Lite version for development)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile-lite
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://recruitment_user:recruitment_pass@postgres:5432/recruitment_db
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=your_jwt_secret_key
      - GOOGLE_CREDENTIALS_PATH=/app/credentials/google-credentials.json
      # Development mode flags
      - FACE_DETECTION_ENABLED=false
      - AI_FEATURES_ENABLED=false
    volumes:
      - ./credentials:/app/credentials
    depends_on:
      - postgres
      - redis

  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
      - REACT_APP_WS_URL=ws://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  # PostgreSQL Database
  postgres:
    image: postgres:13
    environment:
      - POSTGRES_DB=recruitment_db
      - POSTGRES_USER=recruitment_user
      - POSTGRES_PASSWORD=recruitment_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Redis Cache
  redis:
    image: redis:6
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
